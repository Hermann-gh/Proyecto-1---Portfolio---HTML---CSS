<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Hermann Villar</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/contacto.css">
</head>

<body>

<!-- ========================= HEADER ========================= -->
<header class="header">

    <div class="logo-container">
        <img src="img/logo.png" class="logo" alt="Logo">
        <h1 class="titulo">
            <span class="normal">Hermann</span><span class="bold">Villar</span>
        </h1>
    </div>

    <button class="btn-inicio" onclick="location.href='index.html'">
        Inicio
    </button>

</header>

<!-- ========================= HERO ========================= -->
<section class="hero">

    <div class="hero-image"></div>
    <div class="hero-overlay"></div>

    <div class="hero-content">
        <h1 class="t1">Contacto</h1>
        <h1 class="t2">Conecta conmigo</h1>
        <h1 class="t3">Disponible para proyectos</h1>
    </div>

</section>

<!-- ========================= TARJETAS ========================= -->
<section class="contacto-grid">

    <a href="https://linkedin.com" class="card">
        <div class="card-img linkedin"></div>
        <h3>LinkedIn</h3>
    </a>

    <a href="https://instagram.com" class="card">
        <div class="card-img instagram"></div>
        <h3>Instagram</h3>
    </a>

    <a href="https://x.com" class="card">
        <div class="card-img x"></div>
        <h3>X</h3>
    </a>

    <a href="mailto:correo@email.com" class="card">
        <div class="card-img email"></div>
        <h3>Email</h3>
    </a>

</section>

<!-- ========================= FOOTER ========================= -->
<footer class="footer">
    <p>2026 © Hermann Villar</p>
</footer>

</body>
</html>
